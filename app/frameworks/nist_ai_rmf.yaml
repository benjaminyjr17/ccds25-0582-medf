id: nist_ai_rmf
name: NIST AI Risk Management Framework
version: "1.0"
description: Core functions derived from NIST AI RMF.
criteria:
  - id: rmf_fairness
    name: Fairness Risk Management
    dimension: fairness_nondiscrimination
    description: Identify and mitigate inequitable model outcomes.
    subcategories:
      - MAP-2.3
      - MEASURE-2.2
    assessment_questions:
      - Are fairness risks identified with measurable indicators?
      - Are mitigation controls validated after model updates?
    weight: 0.10
  - id: rmf_accountability
    name: Govern
    dimension: accountability
    description: Establish governance and accountability controls.
    subcategories:
      - GOVERN-1.1
      - GOVERN-1.2
      - GOVERN-2.1
      - GOVERN-3.1
      - GOVERN-4.1
      - MANAGE-4.2
    assessment_questions:
      - Are governance roles and risk ownership formally assigned?
      - Are AI risk decisions recorded with rationale and approvers?
      - Are policy controls mapped to operational procedures?
      - Are independent reviews or audits scheduled and tracked?
      - Are incident response responsibilities defined and exercised?
      - Are corrective actions monitored to closure with accountability?
    weight: 0.30
  - id: rmf_transparency
    name: Explainability and Traceability
    dimension: transparency_explainability
    description: Support transparency and decision traceability.
    subcategories:
      - MAP-1.3
      - MANAGE-1.1
    assessment_questions:
      - Are model assumptions and limitations documented for stakeholders?
      - Are decision traces available for post-hoc review and audit?
    weight: 0.12
  - id: rmf_privacy
    name: Data and Privacy Risk
    dimension: privacy_data_governance
    description: Manage privacy and data governance risks.
    subcategories:
      - MAP-2.1
      - MEASURE-3.1
    assessment_questions:
      - Are privacy risks assessed for data collection and processing activities?
      - Are governance controls in place for data access and retention?
    weight: 0.12
  - id: rmf_safety
    name: Robustness and Reliability
    dimension: safety_robustness
    description: Manage robustness, resilience, and safety risk.
    subcategories:
      - MEASURE-1.1
      - MEASURE-1.2
      - MEASURE-2.1
      - MANAGE-2.1
      - MANAGE-2.2
    assessment_questions:
      - Are reliability thresholds defined and monitored in operations?
      - Are stress, failure mode, and robustness evaluations routinely executed?
      - Are safety incidents captured and used to update controls?
      - Are resilience controls validated against foreseeable disruptions?
      - Are deployment gates tied to safety and reliability evidence?
    weight: 0.24
  - id: rmf_human_oversight
    name: Human Oversight
    dimension: human_agency_oversight
    description: Include meaningful human review and oversight practices.
    subcategories:
      - GOVERN-5.1
      - MANAGE-3.1
    assessment_questions:
      - Are human review checkpoints defined for high-impact decisions?
      - Are escalation procedures available when automation confidence is low?
    weight: 0.12
